name: RC1 Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pulse_r24_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d pulse_r24_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pulse_r24_ci
      AUTH_SECRET: ci_auth_secret_for_release_candidate_validation
      NEXTAUTH_URL: http://localhost:3000
      NODE_ENV: test
      LOG_LEVEL: error
      ADMIN_EMAIL: admin@pulse-r24.local
      ADMIN_PASSWORD: SuperSecret123!
      ADMIN_NAME: Super Admin
      DEMO_PASSWORD: DemoPass123!
      DEMO_ANALYST_EMAIL: analyst@pulse-r24.local
      DEMO_EDITOR_EMAIL: editor@pulse-r24.local
      DEMO_REVIEWER_EMAIL: reviewer@pulse-r24.local
      DEMO_PUBLISHER_EMAIL: publisher@pulse-r24.local

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Prepare CI database
        run: npm run db:push

      - name: Verify seed scripts
        run: npm run seed:bootstrap

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: Production build
        run: npm run build --workspace @pulse-r24/web
